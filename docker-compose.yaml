services:
  # --------------------------------------------------------
  # Traefik Reverse Proxy
  # --------------------------------------------------------
  traefik:
    image: traefik:v3.7
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--providers.file.filename=/etc/traefik/dynamic.yaml"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" 
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/.certs:/certs:ro 
      - ./infra/traefik-dynamic.yaml:/etc/traefik/dynamic.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --------------------------------------------------------
  # Identity
  # --------------------------------------------------------
  dex:
    image: ghcr.io/dexidp/dex:v2.38.0
    volumes:
      - ./infra/dex-config.yaml:/etc/dex/config.docker.yaml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dex.rule=Host(`dex.tidsapparat.test`)"
      - "traefik.http.routers.dex.entrypoints=websecure"
      - "traefik.http.routers.dex.tls=true"
      - "traefik.http.services.dex.loadbalancer.server.port=5556"

  # --------------------------------------------------------
  # Observability
  # --------------------------------------------------------
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    environment:
      - ZO_ROOT_USER_EMAIL=admin@example.com
      - ZO_ROOT_USER_PASSWORD=password123
    volumes:
      - o2_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.observe.rule=Host(`observe.tidsapparat.test`)"
      - "traefik.http.routers.observe.entrypoints=websecure"
      - "traefik.http.routers.observe.tls=true"
      - "traefik.http.services.observe.loadbalancer.server.port=5080"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./infra/otel-config.yaml:/etc/otel/config.yaml
      - ./backend/logs:/etc/app/logs:ro
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "3217:4317" # OTLP gRPC (Needed for Go backend on host)
      - "3218:4318" # OTLP HTTP (Needed for Vite frontend on host)
    depends_on:
      - openobserve

  # --------------------------------------------------------
  # Data Stores
  # --------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tidsapparat_redis
    ports:
      - "3251:6379" # Needed for Go backend on host
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  redisinsight:
    image: redis/redisinsight:latest
    container_name: tidsapparat_redisinsight
    environment:
      - RI_APP_PORT=5540
      - RI_APP_HOST=0.0.0.0
      - RI_ACCEPT_TERMS_AND_CONDITIONS=true
      - RI_REDIS_ALIAS0=Tidsapparat-Redis
      - RI_REDIS_HOST0=tidsapparat_redis
      - RI_REDIS_PORT0=6379
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.redis.rule=Host(`redis.tidsapparat.test`)"
      - "traefik.http.routers.redis.entrypoints=websecure"
      - "traefik.http.routers.redis.tls=true"
      - "traefik.http.services.redis.loadbalancer.server.port=5540"

  minio:
    image: minio/minio:latest
    container_name: tidsapparat_minio
    ports:
      - "3250:9000" # S3 API (Needed for Go backend on host)
    environment:
      - MINIO_ROOT_USER=local-admin
      - MINIO_ROOT_PASSWORD=local-super-secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.tidsapparat.test`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.services.minio.loadbalancer.server.port=9001"

  minio-init:
    image: minio/mc
    container_name: tidsapparat_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local_minio http://tidsapparat_minio:9000 local-admin local-super-secret) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local_minio/tidsapparat-exports;
      /usr/bin/mc anonymous set download local_minio/tidsapparat-exports;
      exit 0;
      "

volumes:
  o2_data:
  redis_data:
  redisinsight_data:
  minio_data: