name: GHCR Cleanup

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch multi-platform package version SHAs
        id: multi-arch-digests
        run: |
          DIGESTS=$(docker manifest inspect ghcr.io/potibm/tidsapparat | jq -r '.manifests[].digest' | paste -s -d ' ' -)
          echo "multi-arch-digests=$DIGESTS" >> "$GITHUB_ENV"

      - name: Run container-retention-policy
        uses: snok/container-retention-policy@3b0972b2276b171b212f8c4efbca59ebba26eceb # v3.0.1
        with:
          image-names: tidsapparat
          account: user
          cut-off: 60d
          keep-n-most-recent: 20
          token: ${{ secrets.GHCR_PAT }}
          skip-shas: ${{ env.multi-arch-digests }}
          dry-run: false
