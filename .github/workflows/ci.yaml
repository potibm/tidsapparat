name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  # ==========================================
  # 1. LINTING
  # ==========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Install dependencies
        run: mise run deps:install

      - name: Run Linters (Go, TS, Prettier, Dotenv)
        run: mise run lint

  # ==========================================
  # 2. UNIT TESTS
  # ==========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Install dependencies
        run: mise run deps:install

      - name: Run all tests
        run: mise run test

      - name: Upload Go Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: backend/coverage.out
          retention-days: 3

      - name: Upload TS Coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ts-coverage
          path: frontend/coverage/
          retention-days: 3

  # ==========================================
  # 4. DOCKER BUILD CHECK
  # ==========================================
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true

      - name: Build Docker image
        run: mise run docker:build

  # ==========================================
  # 5. SONARQUBE ANALYSIS
  # ==========================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Go Coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: go-coverage
          path: backend/

      - name: Download TS Coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ts-coverage
          path: frontend/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        with:
          args: >
            -Dsonar.qualitygate.wait=${{ github.ref != 'refs/heads/main' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
