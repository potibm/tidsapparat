name: Docker Release Build

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  actions: read
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Extract metadata (tags + labels + annotations)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_NAME }}
          bake-target: tidsapparat
          tags: |
            type=ref,event=tag,prefix=,suffix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build date
        id: builddate
        run: echo "value=$(date --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: bake
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta.outputs.bake-file-tags }}
            cwd://${{ steps.meta.outputs.bake-file-labels }}
            cwd://${{ steps.meta.outputs.bake-file-annotations }}
          push: true
          targets: tidsapparat
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            tidsapparat.args.VERSION=${{ steps.meta.outputs.version }}
            tidsapparat.args.BUILD_DATE=${{ steps.builddate.outputs.value }}            
            tidsapparat.labels.org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            tidsapparat.labels.org.opencontainers.image.created=${{ steps.builddate.outputs.value }}
            tidsapparat.labels.org.opencontainers.image.description=A timetable editor for demoparties.
            tidsapparat.labels.org.opencontainers.image.title=Tidsapparat
            tidsapparat.labels.org.opencontainers.image.licenses=MIT
            tidsapparat.annotations=index,manifest:org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            tidsapparat.annotations=index,manifest:org.opencontainers.image.created=${{ steps.builddate.outputs.value }}

      - name: Get digest
        id: digest
        run: |
          IMAGE=${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          OUT=$(docker buildx imagetools inspect "$IMAGE")
          echo "$OUT"
          DIGEST=$(echo "$OUT" | grep -E '^Digest:' | awk '{print $2}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM with Anchore
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          output-file: sbom.spdx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          upload-release-assets: false

      - name: Publish SBOM Artifact
        uses: anchore/sbom-action/publish-sbom@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          sbom-artifact-match: ".*\\.spdx\\.json$"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.5.0"

      - name: Sign image with Cosign
        run: |
          cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Attest description
        run: |
          jq -n --arg version "${{ steps.meta.outputs.version }}" \
                --arg built_at "${{ steps.builddate.outputs.value }}" \
                '{
                  description: "Image built and signed via GitHub Actions",
                  project: "tidsapparat",
                  version: $version,
                  built_at: $built_at,
                  repository: "https://github.com/potibm/tidsapparat"
                }' > description.json
          cosign attest --yes \
            --predicate description.json \
            --type custom \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Attest SBOM with Cosign
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            ${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"
