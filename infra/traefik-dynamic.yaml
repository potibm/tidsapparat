http:
  routers:
    vite:
      rule: "Host(`tidsapparat.test`)"
      entryPoints:
        - websecure
      service: vite-host
      tls: {} 

  services:
    vite-host:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3200"

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /certs/cert.pem
        keyFile: /certs/key.pem
  certificates:
    - certFile: /certs/cert.pem
      keyFile: /certs/key.pem